<style>

body{
  font-family:'Nunito Sans', sans-serif;

/* HEADER */

.navbar{

.logo-area{

  height:60px;
  object-fit:contain;
}

.logo-text{
  font-weight:800;
  font-size:20px;

/* NAVIGATION */
nav{
  display:flex;
  gap:20px;
  align-items:center;
}

nav a{
  text-decoration:none;
  color:white;
  font-weight:600;
  transition:0.3s;
}

nav a:hover{
  color:#b6ffb6;
}

/* LANGUAGE BUTTONS */
.lang-btn{
  display:flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
  font-weight:700;
  text-decoration:none;
  color:white;
}

.lang-en{
  background:#1f3c88; 
}

.lang-fr{
  background:#002395; 
}

.lang-btn:hover{
  opacity:0.85;
}

/* HAMBURGER */
.menu-toggle{
  display:none;
  font-size:26px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:30px 15px;
}

/* GRID */
.news-container{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

/* CARD */
.news-card{
  background:#0d1b3d;
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
  display:flex;
  flex-direction:column;
}

.news-card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 25px rgba(218,41,28,0.4);
}

.news-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.news-content{
  padding:18px;
  display:flex;
  flex-direction:column;
  flex-grow:1;
}

.news-date{
  display:inline-block;
  font-size:12px;
  font-weight:700;
  background:#b6d8ff;
  color:#000;
  padding:4px 8px;
  border-radius:6px;
  margin-bottom:10px;
  width:fit-content;
}

.news-content h3{
  font-size:16px;
  margin-bottom:10px;
  line-height:1.4;
  font-weight:700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.news-excerpt{
  font-size:14px;
  color:#d0d0d0;
  line-height:1.6;
  margin-bottom:15px;
  flex-grow:1;
}

.read-more{
  display:inline-block;
  text-align:center;
  background:#da291c;
  color:white;
  padding:10px;
  border-radius:5px;
  font-weight:700;
  text-decoration:none;
  transition:0.3s;
}

.read-more:hover{
  background:#b71c13;
}

/* INFO SECTION */
.info-section{
  margin-top:50px;
  padding:30px;
  background:linear-gradient(135deg,#001f5c,#002b80);
  border-top:4px solid #da291c;
  border-radius:10px;
}

.info-section h2{
  margin-bottom:15px;
  font-size:20px;
  font-weight:800;
}

.info-section p{

  font-size:15px;
  color:#e0e0e0;
}



/* RESPONSIVE */

<body>

<header>
  <div class="navbar">

    <div class="logo-area">
      <!-- Ganti src dengan logo PSG milikmu -->
      <img src="https://beritapsg.com/img/logo-psg.png" alt="PSG Logo">
      <div class="logo-text">Actualités PSG</div>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav id="navMenu">
      <a href="/">Accueil</a>
      <a href="/jadwal">Matchs et Résultats</a>
      
      <a href="/en" class="lang-btn lang-en">ENGLISH</a>
      <a href="/fr" class="lang-btn lang-fr">FRENCH</a>
    </nav>

  </div>
</header>

<div class="container">
  <div id="news-feed" class="news-grid">
    <p>Chargement des actualités...</p>
  </div>
</div>

<script>

const RSS_URL =
"https://api.rss2json.com/v1/api.json?rss_url=" +
encodeURIComponent(
"https://news.google.com/rss/search?q=PSG+site:lequipe.fr+OR+site:leparisien.fr+OR+site:rmcsport.bfmtv.com+OR+site:francebleu.fr&hl=fr&gl=FR&ceid=FR:fr"
);

const fallbackImage = "https://i.imgur.com/Z0EtmC3.jpeg";

function getExcerpt(text, wordLimit = 20){
  const cleanText = text.replace(/<[^>]*>?/gm, '').trim();
  const words = cleanText.split(/\s+/);
  return words.slice(0, wordLimit).join(" ") + "...";
}

async function loadNews(){
  try{
    const response = await fetch(RSS_URL);
    const data = await response.json();

    let html = "";

    data.items.slice(0,15).forEach(article => {

      const image = article.thumbnail || fallbackImage;

      const date = new Date(article.pubDate)
      .toLocaleDateString("fr-FR",{
        day:"numeric",
        month:"long",
        year:"numeric"
      });

      const excerpt = getExcerpt(article.description || "");

      html += `
      <div class="news-card">
        <img src="${image}" onerror="this.src='${fallbackImage}'">
        <div class="news-content">
          <div class="news-date">${date}</div>
          <h3>${article.title}</h3>
          <div class="news-excerpt">${excerpt}</div>
          <a class="read-more" href="${article.link}" target="_blank">
          Lire l'article
          </a>
        </div>
      </div>
      `;
    });

    document.getElementById("news-feed").innerHTML = html;

  }catch(error){
    document.getElementById("news-feed").innerHTML =
    "<p>Erreur de chargement des actualités.</p>";
  }
}

loadNews();

</script>

</body>
